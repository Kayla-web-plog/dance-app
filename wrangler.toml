name = "dance-app"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# 静态文件目录（相对于项目根目录，. 表示根目录）
pages_build_output_dir = "."

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "dance-app-db"
database_id = "c9ef5e3b-caaf-4b46-a5b5-7720a201e17a"

