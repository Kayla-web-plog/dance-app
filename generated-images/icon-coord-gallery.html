<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A 打勾协调版对比</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #f4f1f8; color: #2b2440; padding: 28px 16px; }
  h1 { text-align: center; font-size: 20px; margin-bottom: 6px; }
  .sub { text-align: center; color: #8a82a0; font-size: 13px; margin-bottom: 24px; }
  .row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .card { background: #fff; border-radius: 16px; padding: 16px; width: 240px;
          box-shadow: 0 6px 20px rgba(80,50,120,.10); text-align: center; }
  .card img { width: 180px; height: 180px; border-radius: 36px; object-fit: cover;
              border: 1px solid #ece8f2; }
  .tag { display: inline-block; margin: 12px 0 6px; font-size: 13px; font-weight: 700;
         background: #efe7fb; color: #7b4bd1; padding: 3px 12px; border-radius: 999px; }
  .desc { font-size: 12px; color: #6f6885; line-height: 1.5; }
  .tip { text-align: center; margin-top: 26px; font-size: 14px; color: #5b5378; }
  .tip b { color: #7b4bd1; }
</style>
</head>
<body>
  <h1>方案 A · 打勾协调版对比</h1>
  <div class="sub">底图都是紫粉爵士舞者 + 金币，只改了右下角打勾的处理，让它更融入、不扎眼</div>
  <div class="row">
    <div class="card">
      <img src="./Mint_green_subtle_checkmark_da_2026-07-20T10-55-28.png" alt="G1">
      <div class="tag">G1 · 柔和薄荷绿</div>
      <div class="desc">低饱和、半透明柔光的薄荷绿小圆勾，保留"绿=完成"的直觉，但存在感降低，和紫粉背景更和谐。</div>
    </div>
    <div class="card">
      <img src="./Pearl_white_minimal_checkmark__2026-07-20T10-55-55.png" alt="G2">
      <div class="tag">G2 · 极简白线</div>
      <div class="desc">半透明珍珠白圆 + 细细的白勾，几乎"隐形"地融入背景，最克制、最不抢戏，整体更高级。</div>
    </div>
    <div class="card">
      <img src="./Champagne_rose_gold_checkmark__2026-07-20T10-56-21.png" alt="G3">
      <div class="tag">G3 · 香槟玫瑰金</div>
      <div class="desc">低对比的玫瑰金/香槟金细勾，和金币、粉紫同属暖色系，呼应统一，温柔不突兀。</div>
    </div>
  </div>
  <div class="tip">你看哪个最顺眼？直接回复我 <b>「选 G1 / G2 / G3」</b>，我立刻缩放成 192×192 + 512×512 替换上线。</div>
</body>
</html>
